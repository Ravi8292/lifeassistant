#---spring.application.name=ai-life-assistant
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/lifeassistant_db
spring.datasource.username=DB_USERNAME
spring.datasource.password=DB_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# --- OLLAMA CONFIGURATION ---
# Ollama's OpenAI-compatible base URL
openai.api.url=http://localhost:11434/v1
# Ollama doesn't need a key, but we leave it blank or dummy
openai.api.key=OPENAI_API_KEY 
# The model you downloaded (run 'ollama pull llama3' in terminal first)
openai.model=llama3.2:1b
